<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Fault - Dashboard</title>
		<meta name="description" content="Fault validates multi-file changes from AI coding agents." />
		<meta name="theme-color" content="#faf8f7" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<script>
			(function() {
				var t = localStorage.getItem('theme') || 'system';
				var d = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme:dark)').matches);
				if (d) {
					document.documentElement.classList.add('dark');
					document.querySelector('meta[name="theme-color"]').content = '#07080c';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
